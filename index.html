    border-radius: 50%;
    background: rgba(0, 255, 0, 0.35);
    border: 2px solid rgba(0, 255, 0, 0.6);
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
</style>

  const scaleX = window.innerWidth / W;
  const scaleY = (window.innerHeight - joyH) / H;
  const s = Math.min(scaleX, scaleY, 1);
  canvas.style.width = Math.floor(W * s) + 'px';
  canvas.style.height = Math.floor(H * s) + 'px';
}

const ROBOT_SPRITE = [

// Chimp sprite: 32x24, rendered size

const CHIMP_H = 32 * SP;
// Robot sprite: 16x16, rendered size

const ROBOT_H = 16 * SP;

// Hitbox offsets (tighter than visual)
const CHIMP_HB = { x: 5 * SP, y: 13 * SP, w: 22 * SP, h: 13 * SP };
const ROBOT_HB = { x: 2 * SP, y: 1 * SP, w: 12 * SP, h: 14 * SP };

// --- Pre-render sprites to offscreen canvases ---
function prerenderSprite(data, scale, color) {
  const w = data[0].length, h = data.length;
  const c = document.createElement('canvas');
  c.width = w * scale; c.height = h * scale;
  const cx = c.getContext('2d');
  cx.fillStyle = color;
  for (let y = 0; y < h; y++)
    for (let x = 0; x < w; x++)
      if (data[y][x] === '1')
        cx.fillRect(x * scale, y * scale, scale, scale);
  return c;
}

// Prerender facing right
const chimpFramesR = CHIMP_FRAMES.map(f => prerenderSprite(f, SP, '#0f0'));
// Prerender facing left (mirrored)
const chimpFramesL = chimpFramesR.map(c => {
  const mc = document.createElement('canvas');
  mc.width = c.width; mc.height = c.height;
  const mx = mc.getContext('2d');
  mx.translate(mc.width, 0);
  mx.scale(-1, 1);
  mx.drawImage(c, 0, 0);
  return mc;
});
const robotImg = prerenderSprite(ROBOT_SPRITE, SP, '#0f0');
const robotEnragedImg = prerenderSprite(ROBOT_SPRITE, SP, '#8f8');

// --- Sound engine (Web Audio API) ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}

function playTone(freq, duration, type, vol) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function sfxScore() {
  playTone(880, 0.05, 'square', 0.06);
}

function sfxHit() {
  playTone(150, 0.3, 'sawtooth', 0.15);
  setTimeout(() => playTone(80, 0.4, 'square', 0.12), 100);
}

function sfxGameOver() {
  const notes = [440, 330, 220, 110];
  notes.forEach((n, i) => setTimeout(() => playTone(n, 0.3, 'square', 0.12), i * 200));
}

function sfxStart() {
  const notes = [330, 440, 550, 660];
  notes.forEach((n, i) => setTimeout(() => playTone(n, 0.1, 'square', 0.08), i * 80));
}

function sfxStep() {
  playTone(60 + Math.random() * 40, 0.03, 'square', 0.02);
}

// --- Noise generator for ambient hum ---
function startAmbient() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(55, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.008, audioCtx.currentTime);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  return { osc, gain };
}

// --- Game state ---
const STATE = { TITLE: 0, PLAYING: 1, HIT: 2, GAMEOVER: 3, PAUSED: 4 };
let state = STATE.TITLE;
let score = 0;
let highScore = 0;
let lives = 3;
let scoreTimer = 0;
let hitTimer = 0;
let gameOverTimer = 0;
let ambient = null;

// Arena bounds (inside border)
const ARENA = { x: 8, y: HUD_H + 8, w: W - 16, h: H - HUD_H - 16 };

// Player
const player = { x: 0, y: 0, speed: 6.0, facing: 1, frame: 0, frameTimer: 0 };

// Robots
const ROBOT_BASE_SPEED = 2.0;
let level = 1;
const robots = [];
// Track player velocity for prediction
let playerVX = 0, playerVY = 0;

// Input
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') {
    if (state === STATE.PLAYING) { state = STATE.PAUSED; return; }
    if (state === STATE.PAUSED) { state = STATE.PLAYING; return; }
  }
  if (e.code === 'Enter' || e.code === 'Space') {
    if (state === STATE.TITLE || state === STATE.GAMEOVER) startGame();
  }
  e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// --- Touch / Virtual joystick (fixed element below canvas) ---
const touch = { active: false, dx: 0, dy: 0 };
const JOYSTICK_DEAD = 10;
const JOYSTICK_MAX = 80;
const joyArea = document.getElementById('joystick-area');
const joyKnob = document.getElementById('joystick-knob');
let joyCenterX = 0, joyCenterY = 0;

if (isTouchDevice) {
  joyArea.style.display = 'block';
  document.getElementById('info').textContent = 'DRAG JOYSTICK TO MOVE';
}

function updateJoyCenter() {
  const rect = joyArea.getBoundingClientRect();
  joyCenterX = rect.left + rect.width / 2;
  joyCenterY = rect.top + rect.height / 2;
}

// Tap on canvas to start/restart
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  initAudio();
  if (state === STATE.TITLE || state === STATE.GAMEOVER) startGame();
}, { passive: false });

// Joystick touch events
joyArea.addEventListener('touchstart', e => {
  e.preventDefault();
  initAudio();
  if (state === STATE.TITLE || state === STATE.GAMEOVER) {
    startGame();
    return;
  }
  updateJoyCenter();
  touch.active = true;
  handleJoyTouch(e.changedTouches[0]);
}, { passive: false });

joyArea.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touch.active) return;
  handleJoyTouch(e.changedTouches[0]);
}, { passive: false });

joyArea.addEventListener('touchend', e => {
  e.preventDefault();
  touch.active = false;
  touch.dx = 0;
  touch.dy = 0;
  joyKnob.style.transform = 'translate(-50%, -50%)';
}, { passive: false });

joyArea.addEventListener('touchcancel', e => {
  touch.active = false;
  touch.dx = 0;
  touch.dy = 0;
  joyKnob.style.transform = 'translate(-50%, -50%)';
});

function handleJoyTouch(t) {
  let dx = t.clientX - joyCenterX;
  let dy = t.clientY - joyCenterY;
  const dist = Math.hypot(dx, dy);
  const clamped = Math.min(dist, JOYSTICK_MAX);

  if (dist > 0) {
    dx = (dx / dist) * clamped;
    dy = (dy / dist) * clamped;
  }

  touch.dx = dx;
  touch.dy = dy;

  // Move visual knob
  joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
}

// --- Game functions ---

function startGame() {
  initAudio();
  sfxStart();
  if (!ambient) ambient = startAmbient();

  state = STATE.PLAYING;
  score = 0;
  lives = 3;
  level = 1;
  scoreTimer = 0;

  // Center player
  player.x = ARENA.x + ARENA.w / 2 - CHIMP_W / 2;
  player.y = ARENA.y + ARENA.h / 2 - CHIMP_H / 2;
  player.facing = 1;
  player.frame = 0;

  // Place robots in corners
  robots.length = 0;
  const corners = [
    { x: ARENA.x + 40, y: ARENA.y + 40 },
    { x: ARENA.x + ARENA.w - ROBOT_W - 40, y: ARENA.y + 40 },
    { x: ARENA.x + 40, y: ARENA.y + ARENA.h - ROBOT_H - 40 },
    { x: ARENA.x + ARENA.w - ROBOT_W - 40, y: ARENA.y + ARENA.h - ROBOT_H - 40 },
  ];
  corners.forEach(c => robots.push({ x: c.x, y: c.y, vx: 0, vy: 0 }));
}

function resetAfterHit() {
  // Move player to center
  player.x = ARENA.x + ARENA.w / 2 - CHIMP_W / 2;
  player.y = ARENA.y + ARENA.h / 2 - CHIMP_H / 2;

  // Push robots to corners
  const corners = [
    { x: ARENA.x + 40, y: ARENA.y + 40 },
    { x: ARENA.x + ARENA.w - ROBOT_W - 40, y: ARENA.y + 40 },
    { x: ARENA.x + 40, y: ARENA.y + ARENA.h - ROBOT_H - 40 },
    { x: ARENA.x + ARENA.w - ROBOT_W - 40, y: ARENA.y + ARENA.h - ROBOT_H - 40 },
  ];
  robots.forEach((r, i) => { r.x = corners[i].x; r.y = corners[i].y; });
}

function getPlayerInput() {
  let dx = 0, dy = 0;

  // Keyboard
  if (keys['ArrowLeft'] || keys['KeyA']) dx = -1;
  if (keys['ArrowRight'] || keys['KeyD']) dx = 1;
  if (keys['ArrowUp'] || keys['KeyW']) dy = -1;
  if (keys['ArrowDown'] || keys['KeyS']) dy = 1;

  // Touch joystick (overrides keyboard if active)
  if (touch.active) {
    const dist = Math.hypot(touch.dx, touch.dy);
    if (dist > JOYSTICK_DEAD) {
      const strength = Math.min(dist, JOYSTICK_MAX) / JOYSTICK_MAX;
      dx = (touch.dx / dist) * strength;
      dy = (touch.dy / dist) * strength;
    } else {
      dx = 0; dy = 0;
    }
  } else if (dx !== 0 && dy !== 0) {
    // Normalize diagonal for keyboard only
    dx *= 0.707;
    dy *= 0.707;
  }

  return { dx, dy };
}

function checkCollision(ax, ay, ahb, bx, by, bhb) {
  return ax + ahb.x < bx + bhb.x + bhb.w &&
         ax + ahb.x + ahb.w > bx + bhb.x &&
         ay + ahb.y < by + bhb.y + bhb.h &&
         ay + ahb.y + ahb.h > by + bhb.y;
}

function clamp(v, min, max) { return v < min ? min : v > max ? max : v; }

// --- Robot AI: collaborative surround ---
const MIN_ROBOT_DIST = ROBOT_W + 10; // minimum distance between robots
let attackerIdx = 0;    // which robot is the designated attacker
let attackerTimer = 0;  // frames until re-evaluation
let enragedIdx = -1;    // which robot is temporarily boosted
let enragedTimer = 0;   // frames remaining for boost
const ENRAGE_DURATION = 600; // ~10 seconds at 60fps
const ENRAGE_BOOST = 1.5;    // 50% speed boost

function updateRobots() {
  const pcx = player.x + CHIMP_W / 2;
  const pcy = player.y + CHIMP_H / 2;

  // Smooth player velocity tracking
  playerVX = playerVX * 0.7 + (pcx - (player.prevX || pcx)) * 0.3;
  playerVY = playerVY * 0.7 + (pcy - (player.prevY || pcy)) * 0.3;
  player.prevX = pcx;
  player.prevY = pcy;

  // Predict where the player will be
  const predFrames = 30;
  const predX = clamp(pcx + playerVX * predFrames, ARENA.x + 100, ARENA.x + ARENA.w - 100);
  const predY = clamp(pcy + playerVY * predFrames, ARENA.y + 100, ARENA.y + ARENA.h - 100);

  // Shrink formation when player is slow/still, expand when running
  const playerSpeed = Math.hypot(playerVX, playerVY);
  const speedFactor = clamp(playerSpeed / 3, 0, 1);
  // Tighter near walls too
  const nearWallX = Math.min(pcx - ARENA.x, ARENA.x + ARENA.w - pcx);
  const nearWallY = Math.min(pcy - ARENA.y, ARENA.y + ARENA.h - pcy);
  const wallFactor = clamp(Math.min(nearWallX, nearWallY) / 350, 0, 1);
  // Radius: 60 (closing in when still) to 270 (spread when running)
  const radius = 60 + speedFactor * 120 + wallFactor * 90;

  // Formation rotates to put one robot blocking the escape direction
  const escapeAngle = Math.atan2(playerVY, playerVX);

  // 4 evenly spaced positions, first one blocks escape
  const targets = [0, 1, 2, 3].map(i => {
    const a = escapeAngle + Math.PI + (i * Math.PI / 2);
    return {
      x: predX + Math.cos(a) * radius,
      y: predY + Math.sin(a) * radius,
    };
  });

  // Assign each robot to nearest available target
  const used = [false, false, false, false];
  const assignment = new Array(4);
  for (let pass = 0; pass < 4; pass++) {
    let bestR = -1, bestT = -1, bestD = Infinity;
    for (let ri = 0; ri < 4; ri++) {
      if (assignment[ri] !== undefined) continue;
      const rcx = robots[ri].x + ROBOT_W / 2;
      const rcy = robots[ri].y + ROBOT_H / 2;
      for (let ti = 0; ti < 4; ti++) {
        if (used[ti]) continue;
        const d = Math.hypot(targets[ti].x - rcx, targets[ti].y - rcy);
        if (d < bestD) { bestD = d; bestR = ri; bestT = ti; }
      }
    }
    assignment[bestR] = targets[bestT];
    used[bestT] = true;
  }

  // Pick attacker: re-evaluate every ~60 frames, random tiebreak
  attackerTimer--;
  if (attackerTimer <= 0) {
    attackerTimer = 60;
    const DIST_TIE = 30;
    const dists = robots.map((r, i) => ({
      i, d: Math.hypot(r.x + ROBOT_W / 2 - pcx, r.y + ROBOT_H / 2 - pcy)
    }));
    const minDist = Math.min(...dists.map(d => d.d));
    const tied = dists.filter(d => d.d - minDist < DIST_TIE);
    attackerIdx = tied[Math.floor(Math.random() * tied.length)].i;
  }
  const closestIdx = attackerIdx;

  // Move each robot
  robots.forEach((r, i) => {
    const rcx = r.x + ROBOT_W / 2;
    const rcy = r.y + ROBOT_H / 2;
    const toRobotX = rcx - pcx;
    const toRobotY = rcy - pcy;
    const distToPlayer = Math.hypot(toRobotX, toRobotY);

    // Dot product: positive means player moves toward this robot
    const dot = playerVX * toRobotX + playerVY * toRobotY;
    const playerApproaching = dot > 0.5 && playerSpeed > 0.5;

    let goalX, goalY;

    if (playerApproaching && distToPlayer < radius * 1.5) {
      // Player charging at me: attack directly
      goalX = pcx;
      goalY = pcy;
    } else if (playerSpeed < 0.3 && i === closestIdx) {
      // Player is still: closest robot attacks directly
      goalX = pcx;
      goalY = pcy;
    } else {
      // Move to formation position
      goalX = assignment[i].x;
      goalY = assignment[i].y;
    }

    const dx = goalX - rcx;
    const dy = goalY - rcy;
    const dist = Math.hypot(dx, dy);

    // Desired velocity toward goal (5% faster per level)
    let robotSpeed = ROBOT_BASE_SPEED * Math.pow(1.10, level - 1);
    if (i === enragedIdx && enragedTimer > 0) robotSpeed *= ENRAGE_BOOST;
    let desiredVX = 0, desiredVY = 0;
    if (dist > 2) {
      desiredVX = (dx / dist) * robotSpeed;
      desiredVY = (dy / dist) * robotSpeed;
    }

    // Inertia: blend current velocity toward desired (lower = more slide)
    const INERTIA = 0.06;
    r.vx += (desiredVX - r.vx) * INERTIA;
    r.vy += (desiredVY - r.vy) * INERTIA;

    r.x += r.vx;
    r.y += r.vy;
  });

  // Separation: push robots apart so they never overlap
  for (let i = 0; i < robots.length; i++) {
    for (let j = i + 1; j < robots.length; j++) {
      const ax = robots[i].x + ROBOT_W / 2;
      const ay = robots[i].y + ROBOT_H / 2;
      const bx = robots[j].x + ROBOT_W / 2;
      const by = robots[j].y + ROBOT_H / 2;
      const dx = bx - ax;
      const dy = by - ay;
      const dist = Math.hypot(dx, dy);
      if (dist < MIN_ROBOT_DIST && dist > 0) {
        const overlap = (MIN_ROBOT_DIST - dist) / 2;
        const nx = dx / dist;
        const ny = dy / dist;
        robots[i].x -= nx * overlap;
        robots[i].y -= ny * overlap;
        robots[j].x += nx * overlap;
        robots[j].y += ny * overlap;
      }
    }
  }

  // Decrement enrage timer
  if (enragedTimer > 0) enragedTimer--;

  // Clamp to arena
  robots.forEach(r => {
    r.x = clamp(r.x, ARENA.x, ARENA.x + ARENA.w - ROBOT_W);
    r.y = clamp(r.y, ARENA.y, ARENA.y + ARENA.h - ROBOT_H);
  });
}

// --- Main update ---
function update() {
  if (state === STATE.PLAYING) {
    const inp = getPlayerInput();
    const moving = inp.dx !== 0 || inp.dy !== 0;

    player.x += inp.dx * player.speed;
    player.y += inp.dy * player.speed;

    // Clamp to arena
    player.x = clamp(player.x, ARENA.x, ARENA.x + ARENA.w - CHIMP_W);
    player.y = clamp(player.y, ARENA.y, ARENA.y + ARENA.h - CHIMP_H);

    // Facing direction
    if (inp.dx > 0) player.facing = 1;
    else if (inp.dx < 0) player.facing = -1;

    // Animation
    if (moving) {
      player.frameTimer++;
      if (player.frameTimer >= 8) {
        player.frameTimer = 0;
        player.frame = (player.frame + 1) % 4;
        if (player.frame === 0 || player.frame === 2) sfxStep();
      }
    } else {
      player.frame = 0;
      player.frameTimer = 0;
    }

    // Update robots
    updateRobots();

    // Check collisions
    for (const r of robots) {
      if (checkCollision(player.x, player.y, CHIMP_HB, r.x, r.y, ROBOT_HB)) {
        lives--;
        sfxHit();
        if (lives <= 0) {
          state = STATE.GAMEOVER;
          gameOverTimer = 0;
          sfxGameOver();
          if (score > highScore) highScore = score;
        } else {
          state = STATE.HIT;
          hitTimer = 0;
        }
        break;
      }
    }

    // Score: +10 every 30 frames (~0.5s)
    scoreTimer++;
    if (scoreTimer >= 30) {
      scoreTimer = 0;
      score += 10;
      sfxScore();
      // Level up every 1000 points
      const newLevel = Math.floor(score / 1000) + 1;
      if (newLevel > level) {
        level = newLevel;
        playTone(660, 0.15, 'square', 0.1);
        setTimeout(() => playTone(880, 0.2, 'square', 0.1), 150);
        // Enrage a random robot for 10 seconds
        enragedIdx = Math.floor(Math.random() * robots.length);
        enragedTimer = ENRAGE_DURATION;
      }
    }

  } else if (state === STATE.HIT) {
    hitTimer++;
    if (hitTimer > 90) { // 1.5s pause
      state = STATE.PLAYING;
      resetAfterHit();
      scoreTimer = 0;
    }
  } else if (state === STATE.GAMEOVER) {
    gameOverTimer++;
  }
}

// --- Rendering ---
function draw() {
  // Clear
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  if (state === STATE.TITLE) {
    drawTitle();
    return;
  }

  // Arena border
  ctx.strokeStyle = '#0a0';
  ctx.lineWidth = 2;
  ctx.strokeRect(ARENA.x - 2, ARENA.y - 2, ARENA.w + 4, ARENA.h + 4);

  // Draw robots
  robots.forEach((r, i) => {
    const isEnraged = i === enragedIdx && enragedTimer > 0;
    // Enraged robot blinks between bright and normal
    const img = isEnraged && Math.floor(Date.now() / 100) % 2 === 0
      ? robotEnragedImg : robotImg;
    ctx.drawImage(img, Math.round(r.x), Math.round(r.y));
  });

  // Draw player
  if (state === STATE.HIT && Math.floor(hitTimer / 6) % 2 === 0) {
    // Blink on hit
  } else {
    const frames = player.facing === 1 ? chimpFramesR : chimpFramesL;
    ctx.drawImage(frames[player.frame], Math.round(player.x), Math.round(player.y));
  }

  // HUD
  drawHUD();

  // Overlays
  if (state === STATE.PAUSED) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#0f0';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = '48px Courier New';
    ctx.fillText('PAUSED', W / 2, H / 2);
    ctx.font = '20px Courier New';
    ctx.fillStyle = '#0a0';
    ctx.fillText('PRESS SPACE TO RESUME', W / 2, H / 2 + 50);
  }
  if (state === STATE.GAMEOVER) {
    drawGameOver();
  }
}

function drawHUD() {
  // Background bar
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, HUD_H);

  ctx.fillStyle = '#0f0';
  ctx.font = '24px Courier New';
  ctx.textBaseline = 'top';

  // Row 1: Score | MONKESCAPE | Lives
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + String(score).padStart(6, '0'), 16, 8);

  ctx.textAlign = 'center';
  ctx.fillText('MONKESCAPE', W / 2, 8);

  ctx.textAlign = 'right';
  let livesStr = '';
  for (let i = 0; i < lives; i++) livesStr += '\u2665 ';
  ctx.fillText('LIVES: ' + livesStr, W - 16, 8);

  // Row 2: Level | Hi-Score
  ctx.font = '18px Courier New';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#0a0';
  ctx.fillText('LV.' + level, 16, 34);

  if (highScore > 0) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#080';
    ctx.fillText('HI: ' + String(highScore).padStart(6, '0'), W / 2, 34);
  }
}

function drawTitle() {
  ctx.fillStyle = '#0f0';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Title
  ctx.font = '64px Courier New';
  ctx.fillText('MONKESCAPE', W / 2, H / 2 - 160);

  // Draw chimp and robots
  const cx = W / 2 - CHIMP_W / 2;
  const cy = H / 2 - CHIMP_H / 2;
  ctx.drawImage(chimpFramesR[0], cx, cy);
  ctx.drawImage(robotImg, cx - 240, cy - 80);
  ctx.drawImage(robotImg, cx + 240, cy - 80);
  ctx.drawImage(robotImg, cx - 240, cy + 80);
  ctx.drawImage(robotImg, cx + 240, cy + 80);

  // Instructions
  ctx.font = '24px Courier New';
  ctx.fillText('PRESS ENTER OR TAP TO START', W / 2, H / 2 + 160);

  ctx.font = '18px Courier New';
  ctx.fillStyle = '#080';
  ctx.fillText('KEYBOARD: ARROWS / WASD', W / 2, H / 2 + 220);
  ctx.fillText('MOBILE: TOUCH & DRAG TO MOVE', W / 2, H / 2 + 250);
  ctx.fillText('SURVIVE THE ROBOTS!', W / 2, H / 2 + 280);

  if (highScore > 0) {
    ctx.fillStyle = '#0f0';
    ctx.font = '20px Courier New';
    ctx.fillText('HIGH SCORE: ' + String(highScore).padStart(6, '0'), W / 2, H / 2 + 310);
  }

  // Blink effect
  if (Math.floor(Date.now() / 500) % 2 === 0) {
    ctx.fillStyle = '#000';
    ctx.fillRect(W / 2 - 300, H / 2 + 145, 600, 35);
    ctx.fillStyle = '#0f0';
    ctx.font = '24px Courier New';
    ctx.fillText('PRESS ENTER OR TAP TO START', W / 2, H / 2 + 160);
  }
}

function drawGameOver() {
  // Semi-transparent overlay
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#0f0';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.font = '56px Courier New';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 60);

  ctx.font = '28px Courier New';
  ctx.fillText('SCORE: ' + String(score).padStart(6, '0'), W / 2, H / 2 + 10);

  if (score >= highScore && highScore > 0) {
    ctx.fillStyle = '#0f0';
    ctx.font = '22px Courier New';
    ctx.fillText('*** NEW HIGH SCORE ***', W / 2, H / 2 + 50);
  }

  if (gameOverTimer > 120) {
    ctx.fillStyle = '#0a0';
    ctx.font = '22px Courier New';
    if (Math.floor(Date.now() / 500) % 2 === 0) {
      ctx.fillText('PRESS ENTER OR TAP TO PLAY AGAIN', W / 2, H / 2 + 110);
    }
  }
}

// --- Game loop ---
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
